<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineVerse</title>
  <script type="module" crossorigin src="/cineverse/assets/index-D6rQoqdw.js"></script>
  <link rel="stylesheet" crossorigin href="/cineverse/assets/index-cvywIn89.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">
        <h1>CineVerse</h1>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search movies...">
        <button id="search-btn">🔍</button>
      </div>
      <nav class="nav-menu">
        <ul>
          <li><a href="#home">Home</a></li>
          <li><a href="#movies">Movies</a></li>
          <li><a href="#about">About</a></li>
        </ul>
      </nav>
      <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </header>

  <main>
    <section id="search-results" class="search-results-section hidden">
      <div class="search-header">
        <h2>Search Results for "<span id="search-query-text"></span>"</h2>
        <button id="clear-search-btn" class="clear-search-btn">✕ Clear Search</button>
      </div>
      <div class="search-results-count">Found <span id="results-count">0</span> movie(s)</div>
      <div class="movies-grid" id="search-results-grid"></div>
    </section>

    <section id="home" class="page-section active">
      <h2>Featured Movies</h2>
      <div class="movies-grid" id="home-grid"></div>
    </section>

    <section id="movies" class="page-section">
      <h2>All Movies</h2>
      <div class="movies-grid" id="movies-grid"></div>
    </section>

    <section id="about" class="page-section">
      <h2>About Movies</h2>
      <div class="about-container" id="about-container"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026: CineVerse. All rights reserved.</p>
  </footer>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="close-modal" class="close-btn">&times;</button>
      <iframe id="trailer-iframe" src="" allowfullscreen></iframe>
    </div>
  </div>

</body>
</html>
